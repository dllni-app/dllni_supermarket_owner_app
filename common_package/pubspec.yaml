name: common_package
description: "Internal Flutter foundation package with bootstrap, networking, and Mason generation helpers."
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.9.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.1
  logger: ^2.6.2
  injectable: ^2.7.1+4
  shared_preferences: ^2.5.4
  dartz: ^0.10.1
  easy_localization: ^3.0.8
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  source_gen: ^4.2.0
  analyzer: ^10.0.1
  build: ^4.0.4
  glob: ^2.1.3
  flutter_svg: ^2.2.3
  cached_network_image: ^3.4.1
  text_scroll: ^0.2.1
  toastification: ^3.0.3
  awesome_notifications: ^0.11.0
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  mason: ^0.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  assets:
    - assets/translations/
