name: app_bootstrap
description: Generate a no-flavors Flutter app bootstrap using common_package.
version: 0.1.0+1

environment:
  mason: ^0.1.2

vars:
  app_name:
    type: string
    description: App display name
    default: My App
    prompt: What is your app name?
  org_identifier:
    type: string
    description: App organization identifier
    default: com.example.app
    prompt: What is your organization identifier?
  base_url:
    type: string
    description: API base URL
    default: https://api.example.com
    prompt: What is your API base URL?
  default_locale:
    type: string
    description: Default locale code
    default: en
    prompt: What is the default locale? (en/ar)
  enable_notifications:
    type: boolean
    description: Enable FCM/Awesome Notifications bootstrap wiring
    default: true
    prompt: Enable notification wiring?
