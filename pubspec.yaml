name: dllni_supermarket_owner_app
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  common_package:
    path: common_package

  easy_localization: ^3.0.8
  flutter_bloc: ^9.1.1
  dio: ^5.9.1
  injectable: ^2.7.1+4
  get_it: ^8.2.0
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  awesome_notifications: ^0.11.0
  font_awesome_flutter: ^10.12.0
  shimmer: ^3.0.0
  fl_chart: ^1.1.1
  intl: ^0.20.2
  dotted_border: ^3.1.0
  image_picker: ^1.2.1
  iconsax_plus: ^1.0.0
  toastification: ^3.0.3
  google_mlkit_barcode_scanning: ^0.14.2
  barcode_widget: ^2.0.4
  file_picker: ^10.3.10
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  intl_phone_number_input: ^0.7.5
  logger: ^2.7.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.11.1
  injectable_generator: ^2.12.0

  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.14.4"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"

dependency_overrides:
  analyzer: ^10.0.1

flutter:

  uses-material-design: true

  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  assets:
    - assets/translations/
    - assets/images/
    - assets/images/svgs/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 800
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-Regular.ttf
